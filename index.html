<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield Assist</title>
    <style>
        :root {
            --term-green: #00ff41;
            --term-bg: #0d0208;
            --term-dim: #008f11;
            --danger: #ff4b4b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--term-bg);
            color: var(--term-green);
            font-family: "Courier New", monospace;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        aside {
            width: 100%;
            background: #080808;
            border-bottom: 1px solid var(--term-dim);
            padding: 15px;
        }

        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* Desktop Layout */
        @media (min-width: 768px) {
            body { flex-direction: row; }
            aside { width: 300px; border-bottom: none; border-right: 1px solid var(--term-dim); }
        }

        h1, h2, h3 { letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }
        hr { border: none; border-top: 1px solid var(--term-dim); margin: 15px 0; }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 15px; /* Larger for touch */
            background: transparent;
            color: var(--term-green);
            border: 1px solid var(--term-green);
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: var(--term-green); color: #000; }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: #000;
            color: var(--term-green);
            border: 1px solid var(--term-dim);
            margin: 10px 0;
            font-size: 16px; /* Prevents auto-zoom on iOS */
        }

        textarea { min-height: 150px; resize: vertical; }
        .card { border: 1px solid var(--term-dim); padding: 20px; margin-bottom: 20px; }
        .status { color: var(--term-dim); font-size: 0.9rem; margin-bottom: 10px; }
        
        @media print {
            aside { display: none; }
            body { background: white; color: black; }
        }
    </style>
</head>

<body>

<aside>
    <h2>> CYBERSHIELD_ASSIST</h2>
    <div id="status" class="status">STATUS : SYSTEM READY</div>
    <hr>
    <button onclick="App.navigate('dashboard')">> Dashboard</button>
    <button onclick="App.navigate('interview')">> Incident Interview</button>
    <button onclick="App.navigate('report')">> Recovery Report</button>
</aside>

<main>
    <div id="view"></div>
</main>

<script>
const CONFIG = {
    API_URL: "https://script.google.com/macros/s/AKfycbypnzdbkY9jO1xBe2ewQSl-STCQaeZAuICL4TKH5XggSSO7h4hQFx8R6wtMDXkVv8MeNQ/exec"
};

const App = {
    state: {
        page: "dashboard",
        chat: [{ role: "assistant", text: "Hello. I'm CyberShield Assist.\nPlease describe what happened." }],
        report: null
    },
    navigate(page) {
        this.state.page = page;
        this.render();
    },
    setStatus(text) {
        document.getElementById("status").innerHTML = "STATUS : " + text;
    },
    render() {
        const target = document.getElementById("view");
        switch(this.state.page) {
            case "dashboard":
                target.innerHTML = `
                <div class="card">
                    <h1>CyberShield Assist</h1>
                    <p>AI-powered Incident Assessment Platform.</p>
                    <br>
                    <button onclick="App.navigate('interview')">START INTERVIEW</button>
                </div>`;
                break;
            case "interview":
                const conversation = App.state.chat.map(m => `<p><strong>${m.role}:</strong> ${m.text}</p>`).join("<br>");
                target.innerHTML = `
                <div class="card">
                    <h2>Interview</h2>
                    <div style="margin-bottom:20px;">${conversation}</div>
                    <textarea id="incident" placeholder="Describe incident..."></textarea>
                    <button onclick="Interview.submit()">SEND ANSWER</button>
                </div>`;
                break;
            case "report":
                target.innerHTML = `
                <div class="card">
                    <h2>Recovery Report</h2>
                    ${App.state.report ? `
                        <p><strong>Risk:</strong> ${App.state.report.risk}</p><hr>
                        <p><strong>Analysis:</strong> ${App.state.report.analysis}</p><hr>
                        <p><strong>Mitigation:</strong> ${App.state.report.mitigation}</p>
                        <br><button onclick="window.print()">PRINT REPORT</button>` : "No report generated."}
                </div>`;
                break;
        }
    }
};

const Interview = {
    async submit() {
        const input = document.getElementById("incident");
        const summary = input.value.trim();
        if (!summary) return alert("Please provide details.");
        
        App.state.chat.push({ role: "user", text: summary });
        input.value = "";
        App.setStatus("ANALYZING...");
        
        try {
            const form = new URLSearchParams();
            form.append("chat", JSON.stringify(App.state.chat));
            const response = await fetch(CONFIG.API_URL, { method: "POST", body: form });
            const result = await response.json();
            
            if (result.complete) {
                App.state.report = { risk: result.risk, analysis: result.analysis, mitigation: result.mitigation };
                App.navigate("report");
            } else {
                App.state.chat.push({ role: "assistant", text: result.question });
                App.navigate("interview");
            }
        } catch (err) {
            alert("Error connecting to server.");
        }
    }
};

App.render();
</script>
</body>
</html>
