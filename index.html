<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CyberShield Assist</title>

    <style>

        :root{
            --term-green:#00ff41;
            --term-bg:#0d0208;
            --term-dim:#008f11;
            --danger:#ff4b4b;
            --warning:#ffcc00;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:var(--term-bg);
            color:var(--term-green);
            font-family:"Courier New",monospace;
            display:flex;
            height:100vh;
            overflow:hidden;
        }

        aside{

            width:300px;

            background:#080808;

            border-right:1px solid var(--term-dim);

            padding:20px;

            overflow-y:auto;

        }

        main{

            flex:1;

            overflow-y:auto;

            padding:40px;

        }

        h1,h2,h3{

            letter-spacing:2px;

            text-transform:uppercase;

            margin-bottom:15px;

        }

        hr{

            border:none;

            border-top:1px solid var(--term-dim);

            margin:15px 0;

        }

        button{

            width:100%;

            margin-top:10px;

            padding:12px;

            background:transparent;

            color:var(--term-green);

            border:1px solid var(--term-green);

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            background:var(--term-green);

            color:#000;

        }

        input,
        textarea{

            width:100%;

            padding:12px;

            background:#000;

            color:var(--term-green);

            border:1px solid var(--term-dim);

            margin-top:10px;

            margin-bottom:10px;

        }

        textarea{

            min-height:140px;

            resize:vertical;

        }

        .card{

            border:1px solid var(--term-dim);

            padding:20px;

            margin-bottom:20px;

        }

        .status{

            color:var(--term-dim);

            font-size:.9rem;

            margin-bottom:20px;

        }

        .loading{

            animation:blink 1s infinite;

        }

        @keyframes blink{

            50%{

                opacity:.2;

            }

        }

        pre{

            white-space:pre-wrap;

            word-wrap:break-word;

        }

        @media print{

            aside{

                display:none;

            }

            body{

                display:block;

                background:white;

                color:black;

            }

            main{

                padding:20px;

            }

            button{

                display:none;

            }

        }

    </style>

</head>

<body>

<aside>

    <h2>> CYBERSHIELD_ASSIST</h2>

    <div id="status" class="status">

        STATUS : SYSTEM READY

    </div>

    <hr>

    <button onclick="App.navigate('dashboard')">

        > Dashboard

    </button>

    <button onclick="App.navigate('interview')">

        > Incident Interview

    </button>

    <button onclick="App.navigate('report')">

        > Recovery Report

    </button>

</aside>

<main>

    <div id="view">

    </div>

</main>
<script>

};

        {

            role:"assistant",

            text:"Hello. I'm CyberShield Assist.\nPlease describe what happened."

        }

    ],

    report:null

},

    navigate(page){

        this.state.page=page;

        this.render();

    },

    setStatus(text){

        document.getElementById("status").innerHTML=

            "STATUS : "+text;

    },

    render(){

        const target=document.getElementById("view");

        switch(this.state.page){

            case "dashboard":

                target.innerHTML=`

                        <li>✔ Google Sheets Logging</li>

                    </ul>

                    <br>

                        START INCIDENT INTERVIEW

                    </button>

                </div>

                `;

            break;

            case "interview":

    [...App.state.chat]
    .reverse()
    .find(m => m.role === "assistant");

target.innerHTML = `

<div class="card">

    <h2>Cyber Incident Interview</h2>

    <p style="margin-bottom:20px;">
        ${lastAssistant ? lastAssistant.text : ""}
    </p>

    <textarea
        id="incident"
        placeholder="Type your answer here...">
    </textarea>

    <button onclick="Interview.submit()">
        SEND ANSWER
    </button>

</div>

`;

break;

            case "report":

                target.innerHTML=`

                <div class="card">

                    <h2>Recovery Report</h2>

                    <div id="reportArea">

${
App.state.report ?

`
<p><strong>Risk:</strong></p>
<p>${App.state.report.risk}</p>

<hr>

<p><strong>Analysis</strong></p>
<p>${App.state.report.analysis}</p>

<hr>

<p><strong>Mitigation</strong></p>
<p>${App.state.report.mitigation}</p>

<br>

<button onclick="window.print()">

PRINT REPORT

</button>

`

:

`No report generated yet.`

}

</div>

                </div>

                `;

            break;

        }

    }

};

                <h2>Analyzing...</h2>
                <p>Please wait while CyberShield Assist analyzes the incident.</p>
            </div>
        `;

        try {

            

const form = new URLSearchParams();

            console.error(err);

            App.setStatus("ERROR");

            document.getElementById("view").innerHTML = `
                <div class="card">

                    <h2 style="color:red;">
                        ERROR
                    </h2>

                    <pre>${err}</pre>

                    <button onclick="App.navigate('interview')">

                        TRY AGAIN

                    </button>

                </div>
            `;

App.render();

</script>

</body>
</html>
